<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast & Furious: Redline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00cc;
            --navy-m: #0a163a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .hud-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
        }

        .hud-value {
            font-size: 24px;
            font-weight: 900;
            font-style: italic;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .progress-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.3s ease;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .neon-text {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
        }

        .start-btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
            margin-top: 30px;
        }

        .start-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        #levelUpText {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
        }

        .hidden { display: none !important; opacity: 0; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="glass-panel">
            <div class="hud-label">Gear</div>
            <div class="hud-value" id="levelDisplay">01</div>
        </div>
        <div class="glass-panel text-right">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="scoreDisplay">0000</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <div id="levelUpText">NITRO BOOST!</div>

    <div id="modal" class="modal">
        <h1 class="text-5xl font-black neon-text mb-4">FAST & FURIOUS</h1>
        <p class="hud-label mb-8" id="modalStatus">M-Series Syndicate</p>
        <button id="startBtn" class="start-btn">Initialize Drive</button>
        <p class="mt-12 text-[10px] uppercase tracking-[4px] text-slate-500">Tap or Move to Steer</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelDisplay = document.getElementById('levelDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const progressBar = document.getElementById('progressBar');
        const levelUpText = document.getElementById('levelUpText');
        const modal = document.getElementById('modal');
        const startBtn = document.getElementById('startBtn');
        const modalStatus = document.getElementById('modalStatus');

        let width, height, roadWidth, roadX, laneWidth;
        let gameState = 'MENU';
        let score = 0;
        let level = 1;
        let enemies = [];
        let particles = [];
        let roadOffset = 0;
        let shake = 0;
        let carsPassed = 0;
        const TARGET_CARS = 8;

        const levelSettings = [
            { speed: 8, spawn: 0.015, name: "Midnight Run" },
            { speed: 10, spawn: 0.018, name: "Neon District" },
            { speed: 13, spawn: 0.020, name: "Industrial Zone" },
            { speed: 16, spawn: 0.022, name: "Speed Demon" },
            { speed: 20, spawn: 0.025, name: "Redline Fever" },
            { speed: 25, spawn: 0.028, name: "Ghost Rider" },
            { speed: 30, spawn: 0.030, name: "Maximum Overdrive" },
            { speed: 35, spawn: 0.032, name: "Supersonic" },
            { speed: 42, spawn: 0.035, name: "Hyperdrive" },
            { speed: 50, spawn: 0.040, name: "THE FAMILY" }
        ];

        const ENEMY_COLORS = [
            '#ff2222', '#33ff33', '#ffff33', '#ff33ff', 
            '#ff6600', '#9933ff', '#00ffcc', '#ffffff',
            '#ff0066', '#aaff00', '#0066ff', '#888888'
        ];

        const player = {
            x: 0,
            y: 0,
            w: 0,
            h: 0,
            targetX: 0
        };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            roadWidth = Math.min(width * 0.9, 500);
            roadX = (width - roadWidth) / 2;
            laneWidth = roadWidth / 3;

            player.w = Math.min(roadWidth * 0.16, 70);
            player.h = player.w * 2.1;
            player.y = height - player.h - 100;
            if (gameState === 'MENU') {
                player.x = (width / 2) - (player.w / 2);
                player.targetX = player.x;
            }
        }

        window.addEventListener('resize', resize);
        resize();

        const updateTarget = (clientX) => {
            if (gameState !== 'PLAYING') return;
            const minX = roadX + 15;
            const maxX = roadX + roadWidth - player.w - 15;
            player.targetX = Math.max(minX, Math.min(maxX, clientX - player.w / 2));
        };

        window.addEventListener('mousemove', (e) => updateTarget(e.clientX));
        window.addEventListener('touchmove', (e) => {
            updateTarget(e.touches[0].clientX);
            e.preventDefault();
        }, { passive: false });

        function createExhaust(x, y, color) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 1.5,
                vy: Math.random() * 2 + 3,
                life: 1,
                size: Math.random() * 3 + 2,
                color
            });
        }

        function spawnEnemy() {
            const lane = Math.floor(Math.random() * 3);
            const x = roadX + (lane * laneWidth) + (laneWidth / 2) - (player.w / 2);
            
            if (enemies.some(e => e.y < player.h * 3)) return;

            const usedColors = enemies.map(e => e.color);
            const availableColors = ENEMY_COLORS.filter(c => !usedColors.includes(c));
            const chosenColor = availableColors.length > 0 
                ? availableColors[Math.floor(Math.random() * availableColors.length)]
                : ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];

            enemies.push({
                x,
                y: -player.h * 2,
                w: player.w,
                h: player.h,
                color: chosenColor,
                speedVar: 0.7 + Math.random() * 0.2
            });
        }

        function drawBMWLogo(w, h, size) {
            ctx.save();
            ctx.translate(w/2, h * 0.1);
            
            // Outer ring
            ctx.fillStyle = '#ccc';
            ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI * 2); ctx.fill();
            
            // Black ring
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(0, 0, size * 0.85, 0, Math.PI * 2); ctx.fill();
            
            // Inner quadrants
            const r = size * 0.45;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, r, -Math.PI/2, 0); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, r, Math.PI/2, Math.PI); ctx.fill();
            
            ctx.fillStyle = '#0066b1';
            ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, r, 0, Math.PI/2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, r, Math.PI, 1.5 * Math.PI); ctx.fill();
            
            ctx.restore();
        }

        function drawRealisticCar(car, isPlayer = false) {
            const { x, y, w, h } = car;
            const color = isPlayer ? '#020617' : car.color;
            const glowColor = isPlayer ? '#00f2ff' : car.color;

            ctx.save();
            ctx.translate(x, y);

            // 1. UNDERGLOW
            ctx.shadowBlur = isPlayer ? 45 : 25;
            ctx.shadowColor = glowColor;
            ctx.fillStyle = glowColor;
            ctx.globalAlpha = 0.3 + (Math.sin(Date.now() / 200) * 0.15);
            ctx.beginPath();
            ctx.roundRect(-8, 15, w + 16, h - 30, 15);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // 2. WIDE-BODY CHASSIS
            const bodyGrad = ctx.createLinearGradient(0, 0, w, 0);
            if (isPlayer) {
                bodyGrad.addColorStop(0, '#020617');
                bodyGrad.addColorStop(0.2, '#0a163a');
                bodyGrad.addColorStop(0.5, '#1e3a8a'); // Deep Navy Metallic
                bodyGrad.addColorStop(0.8, '#0a163a');
                bodyGrad.addColorStop(1, '#020617');
            } else {
                bodyGrad.addColorStop(0, '#0a0a0a');
                bodyGrad.addColorStop(0.5, color);
                bodyGrad.addColorStop(1, '#0a0a0a');
            }

            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.moveTo(w * 0.1, 0); 
            ctx.lineTo(w * 0.9, 0);
            ctx.lineTo(w + 5, h * 0.15); 
            ctx.lineTo(w + 2, h * 0.85); 
            ctx.lineTo(w + 8, h * 0.95); 
            ctx.lineTo(w * 0.1, h);      
            ctx.lineTo(-8, h * 0.95);
            ctx.lineTo(-2, h * 0.85);
            ctx.lineTo(-5, h * 0.15);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(w*0.3, h*0.05); ctx.lineTo(w*0.3, h*0.25); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(w*0.7, h*0.05); ctx.lineTo(w*0.7, h*0.25); ctx.stroke();
            
            if (isPlayer) {
                drawBMWLogo(w, h, w * 0.08);
            }
            
            ctx.fillStyle = 'rgba(5, 10, 20, 0.95)'; 
            ctx.beginPath();
            ctx.moveTo(w * 0.18, h * 0.28); 
            ctx.lineTo(w * 0.82, h * 0.28);
            ctx.lineTo(w * 0.78, h * 0.58); 
            ctx.lineTo(w * 0.22, h * 0.58);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath(); ctx.moveTo(w*0.25, h*0.32); ctx.lineTo(w*0.45, h*0.35); ctx.stroke();

            ctx.fillStyle = '#050505';
            const wheelW = w * 0.18;
            const wheelH = h * 0.18;
            [h * 0.1, h * 0.75].forEach(wy => {
                ctx.fillRect(-wheelW*0.6, wy, wheelW, wheelH);
                ctx.fillRect(w - wheelW*0.4, wy, wheelW, wheelH);
            });

            if (isPlayer) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fff';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(w*0.25, h*0.04, 3, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(w*0.75, h*0.04, 3, 0, Math.PI*2); ctx.stroke();
                
                ctx.shadowColor = '#ff0033';
                ctx.fillStyle = '#ff0033';
                ctx.fillRect(w*0.1, h-6, w*0.8, 3);
            } else {
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff0000';
                ctx.fillStyle = '#660000';
                ctx.fillRect(2, h-10, w*0.25, 6);
                ctx.fillRect(w - w*0.25 - 2, h-10, w*0.25, 6);
            }

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#000';
            ctx.fillRect(-w*0.1, h-14, w*1.2, 8);
            ctx.fillRect(w*0.15, h-18, 3, 6);
            ctx.fillRect(w*0.75, h-18, 3, 6);

            ctx.restore();
        }

        function drawWorld() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);
            
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
            ctx.lineWidth = 1;
            const spacing = 80;
            const off = (roadOffset % spacing);
            for(let x=0; x<width; x+=spacing) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }
            for(let y=off; y<height; y+=spacing) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }

            ctx.save();
            if (shake > 0) {
                ctx.translate(Math.random() * shake - shake/2, Math.random() * shake - shake/2);
                shake *= 0.9;
            }

            const roadGrad = ctx.createLinearGradient(roadX, 0, roadX + roadWidth, 0);
            roadGrad.addColorStop(0, '#0a0a0a');
            roadGrad.addColorStop(0.5, '#121212');
            roadGrad.addColorStop(1, '#0a0a0a');
            ctx.fillStyle = roadGrad;
            ctx.fillRect(roadX, 0, roadWidth, height);

            ctx.shadowBlur = 25;
            ctx.shadowColor = 'rgba(0, 242, 255, 0.8)';
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(roadX, 0); ctx.lineTo(roadX, height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(roadX + roadWidth, 0); ctx.lineTo(roadX + roadWidth, height); ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.setLineDash([40, 60]);
            ctx.lineDashOffset = -roadOffset * 3;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 2;
            for(let i=1; i<3; i++) {
                const lx = roadX + (i * laneWidth);
                ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, height); ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.restore();
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            const config = levelSettings[level-1];
            roadOffset += config.speed;
            player.x += (player.targetX - player.x) * 0.2;

            if (Math.random() > 0.4) {
                createExhaust(player.x + player.w*0.2, player.y + player.h, 'rgba(0, 242, 255, 0.3)');
                createExhaust(player.x + player.w*0.8, player.y + player.h, 'rgba(0, 242, 255, 0.3)');
            }

            if (Math.random() < config.spawn) spawnEnemy();

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += config.speed * e.speedVar;

                const pBox = { x: player.x + 5, y: player.y + 10, w: player.w - 10, h: player.h - 20 };
                const eBox = { x: e.x + 5, y: e.y + 10, w: e.w - 10, h: e.h - 20 };

                if (pBox.x < eBox.x + eBox.w && pBox.x + pBox.w > eBox.x && pBox.y < eBox.y + eBox.h && pBox.y + pBox.h > eBox.y) {
                    gameOver();
                }

                if (e.y > height) {
                    enemies.splice(i, 1);
                    score += 100 * level;
                    carsPassed++;
                    if (carsPassed >= TARGET_CARS) {
                        if (level < 10) levelUp(); else gameWon();
                    }
                    updateHUD();
                }
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.y += p.vy;
                p.x += p.vx;
                p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }

        function updateHUD() {
            scoreDisplay.innerText = score.toString().padStart(4, '0');
            levelDisplay.innerText = level.toString().padStart(2, '0');
            progressBar.style.width = (carsPassed / TARGET_CARS) * 100 + '%';
        }

        function levelUp() {
            level++;
            carsPassed = 0;
            shake = 25;
            levelUpText.innerText = levelSettings[level-1].name;
            levelUpText.style.opacity = 1;
            setTimeout(() => levelUpText.style.opacity = 0, 1500);
        }

        function draw() {
            drawWorld();
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
            enemies.forEach(e => drawRealisticCar(e));
            drawRealisticCar(player, true);
            update();
            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            shake = 40;
            modalStatus.innerText = "CRITICAL FAILURE AT " + levelSettings[level-1].name;
            startBtn.innerText = "Re-Sync Neural Link";
            modal.classList.remove('hidden');
        }

        function gameWon() {
            gameState = 'WON';
            modalStatus.innerText = "SUPREME M-SERIES LEGEND";
            startBtn.innerText = "Dominate Again";
            modal.classList.remove('hidden');
        }

        startBtn.onclick = () => {
            score = 0;
            level = 1;
            carsPassed = 0;
            enemies = [];
            particles = [];
            player.x = (width / 2) - (player.w / 2);
            player.targetX = player.x;
            gameState = 'PLAYING';
            modal.classList.add('hidden');
            updateHUD();
        };

        draw();
    </script>
</body>
</html>
