<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast & Furious: Redline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00cc;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: auto;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .hud-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
        }

        .hud-value {
            font-size: 24px;
            font-weight: 900;
            font-style: italic;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .progress-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.3s ease;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .neon-text {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
        }

        .start-btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
            margin-top: 30px;
        }

        .start-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        #levelUpText {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
        }

        .hidden { display: none !important; opacity: 0; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="glass-panel">
            <div class="hud-label">Gear</div>
            <div class="hud-value" id="levelDisplay">01</div>
        </div>
        <div class="glass-panel text-right">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="scoreDisplay">0000</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <div id="levelUpText">NITRO BOOST!</div>

    <div id="modal" class="modal">
        <h1 class="text-5xl font-black neon-text mb-4">FAST & FURIOUS</h1>
        <p class="hud-label mb-8" id="modalStatus">Navy M-Series Syndicate</p>
        <button id="startBtn" class="start-btn">Initialize Drive</button>
        <p class="mt-12 text-[10px] uppercase tracking-[4px] text-slate-500">Tap or Move to Steer</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelDisplay = document.getElementById('levelDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const progressBar = document.getElementById('progressBar');
        const levelUpText = document.getElementById('levelUpText');
        const modal = document.getElementById('modal');
        const startBtn = document.getElementById('startBtn');
        const modalStatus = document.getElementById('modalStatus');

        let width, height, roadWidth, roadX, laneWidth;
        let gameState = 'MENU';
        let score = 0;
        let level = 1;
        let enemies = [];
        let particles = [];
        let roadOffset = 0;
        let shake = 0;
        let carsPassed = 0;
        const TARGET_CARS = 5;

        const levelSettings = [
            { speed: 7, spawn: 0.015, name: "Midnight Run" },
            { speed: 8, spawn: 0.018, name: "Neon District" },
            { speed: 10, spawn: 0.020, name: "Industrial Zone" },
            { speed: 12, spawn: 0.022, name: "Speed Demon" },
            { speed: 14, spawn: 0.025, name: "Redline Fever" },
            { speed: 16, spawn: 0.028, name: "Ghost Rider" },
            { speed: 18, spawn: 0.030, name: "Maximum Overdrive" },
            { speed: 20, spawn: 0.032, name: "Supersonic" },
            { speed: 23, spawn: 0.035, name: "Hyperdrive" },
            { speed: 26, spawn: 0.040, name: "THE FAMILY" }
        ];

        const ENEMY_COLORS = ['#ff0055', '#00ff88', '#ffea00', '#ff00ff', '#ff4400', '#8b5cf6', '#f97316'];

        const player = {
            x: 0,
            y: 0,
            w: 0,
            h: 0,
            targetX: 0
        };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            roadWidth = Math.min(width * 0.9, 500);
            roadX = (width - roadWidth) / 2;
            laneWidth = roadWidth / 3;

            player.w = roadWidth * 0.15;
            player.h = player.w * 2;
            player.y = height - player.h - 80;
            if (gameState === 'MENU') {
                player.x = (width / 2) - (player.w / 2);
                player.targetX = player.x;
            }
        }

        window.addEventListener('resize', resize);
        resize();

        const updateTarget = (clientX) => {
            if (gameState !== 'PLAYING') return;
            const minX = roadX + 10;
            const maxX = roadX + roadWidth - player.w - 10;
            player.targetX = Math.max(minX, Math.min(maxX, clientX - player.w / 2));
        };

        window.addEventListener('mousemove', (e) => updateTarget(e.clientX));
        window.addEventListener('touchmove', (e) => {
            updateTarget(e.touches[0].clientX);
            e.preventDefault();
        }, { passive: false });

        function createParticle(x, y, color) {
            for(let i=0; i<2; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: Math.random() * 2 + 2,
                    life: 1,
                    size: Math.random() * 2 + 1,
                    color
                });
            }
        }

        function spawnEnemy() {
            const lane = Math.floor(Math.random() * 3);
            const x = roadX + (lane * laneWidth) + (laneWidth / 2) - (player.w / 2);
            
            if (enemies.some(e => e.y < player.h * 3)) return;

            enemies.push({
                x,
                y: -player.h * 2,
                w: player.w,
                h: player.h,
                color: ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)]
            });
        }

        function drawBMWLogo(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#ccc';
            ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(0, 0, size * 0.85, 0, Math.PI * 2); ctx.fill();
            const r = size * 0.45;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, r, -Math.PI/2, 0); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, r, Math.PI/2, Math.PI); ctx.fill();
            ctx.fillStyle = '#0066b1';
            ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, r, 0, Math.PI/2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, r, Math.PI, 1.5 * Math.PI); ctx.fill();
            ctx.restore();
        }

        function drawCar(car, isPlayer = false) {
            ctx.save();
            ctx.translate(car.x, car.y);

            ctx.shadowBlur = isPlayer ? 25 : 10;
            ctx.shadowColor = isPlayer ? 'rgba(0, 242, 255, 0.4)' : 'rgba(0,0,0,0.5)';

            // Body Gradient
            const grad = ctx.createLinearGradient(0, 0, car.w, 0);
            if (isPlayer) {
                // Navy Blue M-Series
                grad.addColorStop(0, '#020617');
                grad.addColorStop(0.3, '#0a163a');
                grad.addColorStop(0.5, '#1e3a8a');
                grad.addColorStop(0.7, '#0a163a');
                grad.addColorStop(1, '#020617');
            } else {
                grad.addColorStop(0, '#111');
                grad.addColorStop(0.5, car.color);
                grad.addColorStop(1, '#111');
            }
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(0, 0, car.w, car.h, [car.w/3, car.w/3, 8, 8]);
            ctx.fill();

            // Windshield
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.beginPath();
            ctx.roundRect(car.w * 0.15, car.h * 0.22, car.w * 0.7, car.h * 0.25, 6);
            ctx.fill();

            if (isPlayer) {
                // Logo on hood
                drawBMWLogo(car.w/2, car.h * 0.12, car.w * 0.08);

                // Headlights
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#fff';
                ctx.beginPath(); ctx.arc(car.w * 0.2, 8, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(car.w * 0.8, 8, 3, 0, Math.PI*2); ctx.fill();
                
                // Rear glow (Pink Nitro vibe)
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 0, 204, 1)';
                ctx.fillStyle = 'rgba(255, 0, 204, 0.6)';
                ctx.fillRect(4, car.h - 4, car.w - 8, 3);
            } else {
                // Enemy Tail-lights
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(5, car.h - 10, car.w * 0.2, 5);
                ctx.fillRect(car.w - car.w * 0.2 - 5, car.h - 10, car.w * 0.2, 5);
            }

            ctx.restore();
        }

        function drawWorld() {
            // Background Grid
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);
            
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.06)';
            ctx.lineWidth = 1;
            const gridSize = 60;
            const scroll = (roadOffset % gridSize);
            
            for(let x=0; x<width; x+=gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }
            for(let y=scroll; y<height; y+=gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }

            ctx.save();
            if (shake > 0) {
                ctx.translate(Math.random() * shake - shake/2, Math.random() * shake - shake/2);
                shake *= 0.92;
            }

            // Asphalt
            const roadGrad = ctx.createLinearGradient(roadX, 0, roadX + roadWidth, 0);
            roadGrad.addColorStop(0, '#0a0a0a');
            roadGrad.addColorStop(0.5, '#121212');
            roadGrad.addColorStop(1, '#0a0a0a');
            ctx.fillStyle = roadGrad;
            ctx.fillRect(roadX, 0, roadWidth, height);

            // Neon Lane Borders
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.5)';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0, 242, 255, 0.8)';
            ctx.beginPath(); ctx.moveTo(roadX, 0); ctx.lineTo(roadX, height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(roadX + roadWidth, 0); ctx.lineTo(roadX + roadWidth, height); ctx.stroke();

            // Dash lines
            ctx.shadowBlur = 0;
            ctx.setLineDash([40, 60]);
            ctx.lineDashOffset = -roadOffset * 2.5;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            for(let i=1; i<3; i++) {
                const lx = roadX + (i * laneWidth);
                ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, height); ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.restore();
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            const config = levelSettings[level-1];
            roadOffset += config.speed;

            player.x += (player.targetX - player.x) * 0.18;

            // Exhaust particles for the M-Series
            createParticle(player.x + player.w/2, player.y + player.h, 'rgba(0, 242, 255, 0.2)');

            if (Math.random() < config.spawn) spawnEnemy();

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += config.speed * 0.85;

                const pRect = { x: player.x + 8, y: player.y + 8, w: player.w - 16, h: player.h - 16 };
                const eRect = { x: e.x + 8, y: e.y + 8, w: e.w - 16, h: e.h - 16 };

                if (pRect.x < eRect.x + eRect.w && pRect.x + pRect.w > eRect.x && pRect.y < eRect.y + eRect.h && pRect.y + pRect.h > eRect.y) {
                    gameOver();
                }

                if (e.y > height) {
                    enemies.splice(i, 1);
                    score += 100 * level;
                    carsPassed++;
                    
                    if (carsPassed >= TARGET_CARS) {
                        if (level < 10) levelUp(); else gameWon();
                    }
                    updateHUD();
                }
            }

            for(let i = particles.length -1; i>=0; i--) {
                const p = particles[i];
                p.y += p.vy;
                p.x += p.vx;
                p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }

        function updateHUD() {
            scoreDisplay.innerText = score.toString().padStart(4, '0');
            levelDisplay.innerText = level.toString().padStart(2, '0');
            progressBar.style.width = (carsPassed / TARGET_CARS) * 100 + '%';
        }

        function levelUp() {
            level++;
            carsPassed = 0;
            shake = 20;
            levelUpText.innerText = levelSettings[level-1].name;
            levelUpText.style.opacity = 1;
            setTimeout(() => levelUpText.style.opacity = 0, 1500);
        }

        function draw() {
            drawWorld();
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            enemies.forEach(e => drawCar(e));
            drawCar(player, true);
            
            update();
            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            shake = 40;
            modalStatus.innerText = "WRECKED AT " + levelSettings[level-1].name;
            startBtn.innerText = "Re-Acquire Target";
            modal.classList.remove('hidden');
        }

        function gameWon() {
            gameState = 'WON';
            modalStatus.innerText = "STREET LEGEND: MISSION COMPLETE";
            startBtn.innerText = "Restart Syndicate";
            modal.classList.remove('hidden');
        }

        startBtn.onclick = () => {
            score = 0;
            level = 1;
            carsPassed = 0;
            enemies = [];
            particles = [];
            player.x = (width / 2) - (player.w / 2);
            player.targetX = player.x;
            gameState = 'PLAYING';
            modal.classList.add('hidden');
            updateHUD();
        };

        draw();
    </script>
</body>
</html>
